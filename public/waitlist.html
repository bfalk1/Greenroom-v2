<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GREENROOM - V2 Coming Soon</title>
  <meta name="description" content="The future of music samples. Built for creators, by creators. Join the waitlist.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #050505;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Particle canvas */
    #particles { position: fixed; inset: 0; z-index: 0; }
    
    /* Vignette */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Scanline */
    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #00FF88;
      opacity: 0.03;
      animation: scanline 3s linear infinite;
      z-index: 2;
    }
    
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 600px;
      animation: fadeUp 1s ease-out;
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Waveform bars */
    .waveform {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 3px;
      height: 60px;
      margin-bottom: 30px;
    }
    
    .wave-bar {
      width: 3px;
      background: linear-gradient(to top, #00FF88, rgba(0,255,136,0.3));
      border-radius: 2px;
      animation: wave 1.2s ease-in-out infinite;
    }
    
    @keyframes wave {
      0%, 100% { height: 15%; }
      50% { height: var(--height, 60%); }
    }

    /* Logo */
    .logo-wrapper {
      position: relative;
      margin-bottom: 24px;
      animation: float 6s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
    }
    
    .logo-glow {
      position: absolute;
      inset: -20px;
      background: rgba(0,255,136,0.2);
      filter: blur(40px);
      border-radius: 50%;
    }
    
    .logo {
      position: relative;
      max-width: 100%;
      width: 400px;
      height: auto;
      filter: drop-shadow(0 0 30px rgba(0,255,136,0.5));
    }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 10px 24px;
      font-size: 12px;
      font-family: monospace;
      letter-spacing: 0.3em;
      color: #00FF88;
      background: #0a0a0a;
      border: 1px solid rgba(0,255,136,0.5);
      border-radius: 50px;
      margin-bottom: 32px;
      animation: borderGlow 2s ease-in-out infinite;
    }
    
    @keyframes borderGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(0,255,136,0.3); }
      50% { box-shadow: 0 0 40px rgba(0,255,136,0.6); }
    }

    /* Headline */
    h1 {
      font-size: clamp(32px, 8vw, 56px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    
    .glitch {
      position: relative;
      display: inline-block;
    }
    
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .glitch::before {
      color: #00FF88;
      animation: glitch1 2.5s infinite;
      clip-path: inset(0 0 0 0);
      opacity: 0.7;
    }
    
    .glitch::after {
      color: #ff0088;
      animation: glitch2 2.5s infinite;
      clip-path: inset(0 0 0 0);
      opacity: 0.7;
    }
    
    @keyframes glitch1 {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-3px, 2px); }
      94% { transform: translate(3px, -2px); }
      96% { transform: translate(-2px, 3px); }
    }
    
    @keyframes glitch2 {
      0%, 90%, 100% { transform: translate(0); }
      91% { transform: translate(3px, 2px); }
      93% { transform: translate(-3px, -2px); }
      95% { transform: translate(2px, 3px); }
    }
    
    .highlight { color: #00FF88; }

    .tagline {
      color: #666;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 48px;
    }

    /* Form */
    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 450px;
      margin: 0 auto;
    }
    
    @media (min-width: 500px) {
      form { flex-direction: row; }
    }

    input[type="email"] {
      flex: 1;
      padding: 16px 24px;
      font-size: 16px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #fff;
      outline: none;
      transition: all 0.3s;
    }
    
    input[type="email"]:focus {
      border-color: #00FF88;
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
    }
    
    input[type="email"]::placeholder { color: #444; }

    button {
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 700;
      background: #00FF88;
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }
    
    button:hover {
      background: #00cc6a;
      box-shadow: 0 0 30px rgba(0,255,136,0.5);
      transform: translateY(-2px);
    }
    
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Success state */
    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    
    .success.show { display: flex; }
    
    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(0,255,136,0.2);
      border: 1px solid rgba(0,255,136,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .success-icon svg { width: 32px; height: 32px; color: #00FF88; }
    
    .success-text { color: #00FF88; font-size: 20px; font-weight: 500; }
    .success-sub { color: #666; }

    .error { color: #ff6b6b; margin-top: 16px; display: none; }
    .error.show { display: block; }

    /* Features */
    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      margin-top: 64px;
      font-size: 12px;
      color: #444;
      letter-spacing: 0.1em;
    }
    
    .feature {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .feature-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00FF88;
    }

    /* Audio Teasers */
    .teasers {
      width: 100%;
      max-width: 450px;
      margin: 48px auto 0;
    }
    
    .teasers-label {
      color: #666;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-align: center;
      margin-bottom: 16px;
    }
    
    .teaser {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .teaser:hover {
      border-color: rgba(0,255,136,0.3);
    }
    
    .play-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #00FF88;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    
    .play-btn:hover { transform: scale(1.1); }
    .play-btn svg { width: 16px; height: 16px; color: #000; }
    .play-icon { margin-left: 2px; }
    
    .teaser-info {
      display: flex;
      flex-direction: column;
      min-width: 90px;
    }
    
    .teaser-title { color: #fff; font-size: 14px; font-weight: 500; }
    .teaser-bpm { color: #666; font-size: 11px; }
    
    .waveform-container {
      flex: 1;
      height: 32px;
      position: relative;
      display: flex;
      align-items: center;
      gap: 2px;
    }
    
    .waveform-bars {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 100%;
      width: 100%;
    }
    
    .wave-bar {
      flex: 1;
      background: rgba(255,255,255,0.2);
      border-radius: 1px;
      transition: background 0.1s;
    }
    
    .wave-bar.active { background: #00FF88; }
    
    .waveform-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(0,0,0,0.3));
      pointer-events: none;
      width: 0%;
    }
    
    .preview-badge {
      font-size: 10px;
      font-family: monospace;
      color: #00FF88;
      background: rgba(0,255,136,0.1);
      border: 1px solid rgba(0,255,136,0.2);
      padding: 4px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* Corner decorations */
    .corner {
      position: fixed;
      width: 100px;
      height: 100px;
      border: 2px solid rgba(0,255,136,0.2);
      pointer-events: none;
      z-index: 5;
    }
    
    .corner-tl { top: 32px; left: 32px; border-right: 0; border-bottom: 0; }
    .corner-br { bottom: 32px; right: 32px; border-left: 0; border-top: 0; }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="vignette"></div>
  <div class="scanline"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <!-- Waveform -->
    <div class="waveform" id="waveform"></div>

    <!-- Logo -->
    <div class="logo-wrapper">
      <div class="logo-glow"></div>
      <img src="/greenroom-logo.png" alt="GREENROOM" class="logo">
    </div>

    <!-- Badge -->
    <div class="badge">VERSION 2.0</div>

    <!-- Headline -->
    <h1>
      <span class="glitch" data-text="THE FUTURE OF">THE FUTURE OF</span>
      <br>
      <span class="highlight">SOUND</span>
    </h1>

    <p class="tagline">
      Premium samples. Instant access.<br>
      Built for creators who move fast.
    </p>

    <!-- Form -->
    <form id="form">
      <input type="email" id="email" placeholder="your@email.com" required>
      <button type="submit" id="btn">GET EARLY ACCESS</button>
    </form>

    <div class="success" id="success">
      <div class="success-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <div class="success-text">You're on the list.</div>
      <div class="success-sub">We'll hit you up when it's time.</div>
    </div>

    <div class="error" id="error"></div>

    <!-- Audio Teasers -->
    <div class="teasers" id="teasers">
      <p class="teasers-label">PREVIEW WHAT'S COMING</p>
      <div class="teaser" data-src="/teaser-1.mp3">
        <button class="play-btn" aria-label="Play">
          <svg class="play-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg class="pause-icon" fill="currentColor" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <div class="teaser-info">
          <span class="teaser-title">Midnight Drive</span>
          <span class="teaser-bpm">120 BPM</span>
        </div>
        <div class="waveform-container">
          <div class="waveform-bars"></div>
          <div class="waveform-progress"></div>
        </div>
        <span class="preview-badge">PREVIEW</span>
        <audio preload="metadata"></audio>
      </div>
      <div class="teaser" data-src="/teaser-2.mp3">
        <button class="play-btn" aria-label="Play">
          <svg class="play-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg class="pause-icon" fill="currentColor" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <div class="teaser-info">
          <span class="teaser-title">Neon Dreams</span>
          <span class="teaser-bpm">95 BPM</span>
        </div>
        <div class="waveform-container">
          <div class="waveform-bars"></div>
          <div class="waveform-progress"></div>
        </div>
        <span class="preview-badge">PREVIEW</span>
        <audio preload="metadata"></audio>
      </div>
    </div>

    <!-- Features -->
    <div class="features">
      <div class="feature"><span class="feature-dot"></span> EXCLUSIVE DROPS</div>
      <div class="feature"><span class="feature-dot"></span> INSTANT DOWNLOADS</div>
      <div class="feature"><span class="feature-dot"></span> CREATOR PAYOUTS</div>
    </div>
  </div>

  <script>
    // Generate waveform bars
    const waveform = document.getElementById('waveform');
    for (let i = 0; i < 40; i++) {
      const bar = document.createElement('div');
      bar.className = 'wave-bar';
      bar.style.setProperty('--height', Math.random() * 50 + 40 + '%');
      bar.style.animationDelay = i * 0.05 + 's';
      waveform.appendChild(bar);
    }

    // Particle animation
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const particles = [];
    for (let i = 0; i < 50; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        size: Math.random() * 2 + 1,
        opacity: Math.random() * 0.5 + 0.1
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 255, 136, ${p.opacity})`;
        ctx.fill();
      });

      // Connect nearby particles
      particles.forEach((p1, i) => {
        particles.slice(i + 1).forEach(p2 => {
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(0, 255, 136, ${0.08 * (1 - dist / 120)})`;
            ctx.stroke();
          }
        });
      });

      requestAnimationFrame(animate);
    }
    animate();

    // Audio teasers
    document.querySelectorAll('.teaser').forEach(teaser => {
      const audio = teaser.querySelector('audio');
      const playBtn = teaser.querySelector('.play-btn');
      const playIcon = teaser.querySelector('.play-icon');
      const pauseIcon = teaser.querySelector('.pause-icon');
      const barsContainer = teaser.querySelector('.waveform-bars');
      const src = teaser.dataset.src;
      
      audio.src = src;
      
      // Generate waveform bars
      for (let i = 0; i < 24; i++) {
        const bar = document.createElement('div');
        bar.className = 'wave-bar';
        bar.style.height = (Math.random() * 60 + 30) + '%';
        barsContainer.appendChild(bar);
      }
      
      const bars = barsContainer.querySelectorAll('.wave-bar');
      
      teaser.addEventListener('click', () => {
        // Pause all other teasers
        document.querySelectorAll('.teaser audio').forEach(a => {
          if (a !== audio && !a.paused) {
            a.pause();
            a.currentTime = 0;
            const t = a.closest('.teaser');
            t.querySelector('.play-icon').style.display = 'block';
            t.querySelector('.pause-icon').style.display = 'none';
            t.querySelectorAll('.wave-bar').forEach(b => b.classList.remove('active'));
          }
        });
        
        if (audio.paused) {
          audio.play();
          playIcon.style.display = 'none';
          pauseIcon.style.display = 'block';
        } else {
          audio.pause();
          playIcon.style.display = 'block';
          pauseIcon.style.display = 'none';
        }
      });
      
      audio.addEventListener('timeupdate', () => {
        const progress = (audio.currentTime / audio.duration) * 100;
        bars.forEach((bar, i) => {
          if ((i / bars.length) * 100 <= progress) {
            bar.classList.add('active');
          } else {
            bar.classList.remove('active');
          }
        });
      });
      
      audio.addEventListener('ended', () => {
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
        bars.forEach(b => b.classList.remove('active'));
      });
    });

    // Form handling
    const form = document.getElementById('form');
    const email = document.getElementById('email');
    const btn = document.getElementById('btn');
    const success = document.getElementById('success');
    const error = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'JOINING...';
      error.classList.remove('show');

      try {
        const res = await fetch('/api/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email.value.trim() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong');
        
        form.style.display = 'none';
        success.classList.add('show');
      } catch (err) {
        error.textContent = err.message;
        error.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'GET EARLY ACCESS';
      }
    });
  </script>
</body>
</html>
