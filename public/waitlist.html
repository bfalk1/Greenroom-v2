<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GREENROOM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #050505;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #particles { position: fixed; inset: 0; z-index: 0; }
    
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 20px;
      animation: fadeIn 1s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .logo {
      max-width: 90vw;
      width: 500px;
      height: auto;
      margin-bottom: 60px;
      filter: drop-shadow(0 0 40px rgba(0,255,136,0.4));
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 400px;
      margin: 0 auto;
    }
    
    @media (min-width: 500px) {
      form { flex-direction: row; }
    }

    input[type="email"] {
      flex: 1;
      padding: 16px 24px;
      font-size: 18px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #fff;
      outline: none;
      transition: all 0.3s;
    }
    
    input[type="email"]:focus {
      border-color: #00FF88;
      box-shadow: 0 0 20px rgba(0,255,136,0.15);
    }
    
    input[type="email"]::placeholder { color: #444; }

    button {
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 700;
      background: #00FF88;
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    button:hover {
      background: #00cc6a;
      box-shadow: 0 0 30px rgba(0,255,136,0.4);
    }
    
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .success {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #00FF88;
      font-size: 20px;
    }
    
    .success.show { display: flex; }
    .success svg { width: 24px; height: 24px; }

    .error { color: #ff6b6b; margin-top: 16px; font-size: 14px; display: none; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="vignette"></div>

  <div class="container">
    <img src="/greenroom-logo.png" alt="GREENROOM" class="logo">

    <form id="form">
      <input type="email" id="email" placeholder="your@email.com" required>
      <button type="submit" id="btn">JOIN</button>
    </form>

    <div class="success" id="success">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
      <span>You're in.</span>
    </div>

    <div class="error" id="error"></div>
  </div>

  <script>
    // Particles
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const particles = [];
    for (let i = 0; i < 50; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        size: Math.random() * 2 + 1,
        opacity: Math.random() * 0.5 + 0.1
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 255, 136, ${p.opacity})`;
        ctx.fill();
      });

      particles.forEach((p1, i) => {
        particles.slice(i + 1).forEach(p2 => {
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 150) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(0, 255, 136, ${0.1 * (1 - dist / 150)})`;
            ctx.stroke();
          }
        });
      });

      requestAnimationFrame(animate);
    }
    animate();

    // Form
    const form = document.getElementById('form');
    const email = document.getElementById('email');
    const btn = document.getElementById('btn');
    const success = document.getElementById('success');
    const error = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = '...';
      error.classList.remove('show');

      try {
        const res = await fetch('/api/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email.value.trim() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong');
        
        form.style.display = 'none';
        success.classList.add('show');
      } catch (err) {
        error.textContent = err.message;
        error.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'JOIN';
      }
    });
  </script>
</body>
</html>
